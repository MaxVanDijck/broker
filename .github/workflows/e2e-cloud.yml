name: e2e-cloud

# Only runs on main (has access to secrets) or manual trigger.
# Never runs on fork PRs.
on:
  schedule:
    - cron: "0 6 1,15 * *" # 1st and 15th of each month at 06:00 UTC
  workflow_dispatch:
    inputs:
      instance_type:
        description: "EC2 instance type"
        default: "t3.medium"

# OIDC: no long-lived AWS credentials stored anywhere.
# Configure an IAM role that trusts GitHub's OIDC provider:
#   Principal: arn:aws:iam::<account>:oidc-provider/token.actions.githubusercontent.com
#   Condition: token.actions.githubusercontent.com:sub == repo:<org>/<repo>:ref:refs/heads/main
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  aws-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: configure aws credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: build binaries
        run: |
          go build -o bin/broker ./cmd/broker
          go build -o bin/broker-server ./cmd/broker-server
          go build -o bin/broker-agent ./cmd/broker-agent

      - name: install cloudflared
        run: |
          curl -sSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: start tunnel
        id: tunnel
        run: |
          cloudflared tunnel --url http://localhost:8080 --no-autoupdate > /tmp/cloudflared.log 2>&1 &
          sleep 5
          TUNNEL_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cloudflared.log | head -1)
          echo "url=$TUNNEL_URL" >> "$GITHUB_OUTPUT"
          echo "tunnel url: $TUNNEL_URL"

      - name: write config
        run: |
          mkdir -p ~/.broker
          cat > ~/.broker/config.yaml <<EOF
          api_server:
            http_port: 8080
            public_url: ${{ steps.tunnel.outputs.url }}
          EOF

      - name: start server
        run: |
          bin/broker-server > /tmp/broker-server.log 2>&1 &
          sleep 2

      - name: launch ec2 instance
        run: |
          INSTANCE_TYPE="${{ github.event.inputs.instance_type || 't3.medium' }}"
          bin/broker launch -c ci-test --cloud aws echo "hello from ec2"
          echo "waiting for agent to register..."

      - name: wait for agent registration
        timeout-minutes: 10
        run: |
          for i in $(seq 1 60); do
            NODES=$(curl -sf http://localhost:8080/api/v1/clusters/ci-test/nodes | jq '.nodes | length' 2>/dev/null || echo 0)
            if [ "$NODES" -gt 0 ]; then
              echo "agent registered after $((i * 10)) seconds"
              break
            fi
            sleep 10
          done
          NODES=$(curl -sf http://localhost:8080/api/v1/clusters/ci-test/nodes | jq '.nodes | length')
          [ "$NODES" -gt 0 ] || (echo "agent never registered" && cat /tmp/broker-server.log && exit 1)

      - name: verify cluster status
        run: bin/broker status | grep ci-test

      - name: exec remote job
        run: bin/broker exec ci-test "hostname && uname -a && cat /etc/os-release | head -5"

      - name: verify ssh proxy
        run: |
          bin/broker ssh --stdio ci-test < /dev/null > /dev/null 2>&1 &
          SSH_PID=$!
          sleep 2
          kill $SSH_PID 2>/dev/null || true
          echo "ssh proxy connection established"

      - name: teardown
        if: always()
        run: |
          bin/broker down -y ci-test 2>/dev/null || true

      - name: verify instances terminated
        if: always()
        run: |
          sleep 10
          RUNNING=$(aws ec2 describe-instances \
            --filters "Name=tag:broker:cluster,Values=ci-test" "Name=instance-state-name,Values=running,pending" \
            --query 'Reservations[].Instances[].InstanceId' --output text)
          if [ -n "$RUNNING" ]; then
            echo "orphaned instances found, terminating: $RUNNING"
            aws ec2 terminate-instances --instance-ids $RUNNING
            exit 1
          fi
          echo "all instances terminated"

      - name: upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: broker-server-log
          path: /tmp/broker-server.log
