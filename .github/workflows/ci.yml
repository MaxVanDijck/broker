name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: oven-sh/setup-bun@v2

      - name: dashboard build
        working-directory: dashboard
        run: bun install && bun run build

      - name: embed dashboard
        run: |
          rm -rf internal/dashboard/dist
          cp -r dashboard/dist internal/dashboard/dist

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -race -count=1

      - name: install hugo
        run: |
          curl -sSL https://github.com/gohugoio/hugo/releases/download/v0.159.1/hugo_extended_0.159.1_linux-amd64.tar.gz | tar xz -C /usr/local/bin

      - name: helm lint
        run: helm lint charts/broker/

      - name: docs build
        working-directory: docs
        run: hugo --gc --minify

  e2e-local:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: oven-sh/setup-bun@v2

      - name: build
        run: |
          cd dashboard && bun install && bun run build && cd ..
          rm -rf internal/dashboard/dist
          cp -r dashboard/dist internal/dashboard/dist
          go build -o bin/broker ./cmd/broker
          go build -o bin/broker-server ./cmd/broker-server
          go build -o bin/broker-agent ./cmd/broker-agent

      - name: start server
        run: |
          bin/broker-server &
          sleep 2

      - name: start agent
        run: |
          bin/broker-agent --server ws://localhost:8080 --cluster test --node-id local-0 --self-terminate-after 0 &
          sleep 2

      - name: launch cluster
        run: bin/broker launch -c test echo "hello from ci"

      - name: verify status
        run: |
          for i in $(seq 1 20); do
            bin/broker status | grep -q "UP" && break
            sleep 1
          done
          bin/broker status
          bin/broker status | grep UP

      - name: exec job
        run: bin/broker exec test echo "job from ci"

      - name: verify jobs api
        run: |
          JOBS=$(curl -sf http://localhost:8080/api/v1/jobs | jq '.jobs | length')
          [ "$JOBS" -gt 0 ] || (echo "no jobs found" && exit 1)

      - name: verify nodes api
        run: |
          NODES=$(curl -sf http://localhost:8080/api/v1/clusters/test/nodes | jq '.nodes | length')
          [ "$NODES" -gt 0 ] || (echo "no nodes found" && exit 1)

      - name: teardown
        run: bin/broker down -y test

      - name: verify teardown
        run: |
          STATUS=$(bin/broker status | grep "^test " | awk '{print $2}')
          echo "cluster status: $STATUS"
          [ "$STATUS" = "TERMINATED" ] || [ "$STATUS" = "TERMINATING" ]

  helm-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: oven-sh/setup-bun@v2

      - name: build docker image
        run: |
          docker build -t broker:test .

      - name: create kind cluster
        uses: helm/kind-action@v1

      - name: load image into kind
        run: |
          kind load docker-image broker:test

      - name: install helm chart
        run: |
          helm install broker charts/broker/ \
            --set image.repository=broker \
            --set image.tag=test \
            --set image.pullPolicy=Never \
            --set persistence.enabled=false \
            --wait \
            --timeout 120s

      - name: verify pod is running
        run: |
          kubectl get pods -l app.kubernetes.io/name=broker
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=broker --timeout=60s

      - name: check health endpoint
        run: |
          kubectl port-forward svc/broker 8080:8080 &
          sleep 3
          curl -sf http://localhost:8080/healthz
          echo ""
          echo "healthz OK"

      - name: check api endpoint
        run: |
          curl -sf -X POST http://localhost:8080/broker.v1.BrokerService/Status \
            -H 'Content-Type: application/json' \
            -d '{}' | jq .
          echo "API OK"

      - name: check dashboard
        run: |
          curl -sf http://localhost:8080/ | head -5
          echo "Dashboard OK"

      - name: run helm test
        run: |
          helm test broker

      - name: show logs on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -o wide
          echo "=== Pod describe ==="
          kubectl describe pods -l app.kubernetes.io/name=broker
          echo "=== Pod logs ==="
          kubectl logs -l app.kubernetes.io/name=broker --tail=50
