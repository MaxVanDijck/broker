name: cleanup

# Runs hourly. Terminates ALL EC2 instances and deletes ALL non-default
# security groups in the dedicated test account. This account exists
# solely for broker CI -- nothing else runs in it.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  nuke:
    runs-on: ubuntu-latest
    steps:
      - name: configure aws credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terminate all instances
        run: |
          IDS=$(aws ec2 describe-instances \
            --filters "Name=instance-state-name,Values=running,stopped,pending,stopping" \
            --query 'Reservations[].Instances[].InstanceId' --output text)

          if [ -z "$IDS" ]; then
            echo "no instances"
            exit 0
          fi

          echo "terminating: $IDS"
          aws ec2 terminate-instances --instance-ids $IDS

      - name: delete all non-default security groups
        run: |
          SGS=$(aws ec2 describe-security-groups \
            --query 'SecurityGroups[?GroupName!=`default`].GroupId' --output text)

          for SG in $SGS; do
            echo "deleting: $SG"
            aws ec2 delete-security-group --group-id "$SG" 2>/dev/null || true
          done
