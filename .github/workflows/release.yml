name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.25"

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # broker-agent: no CGO, cross-compiles freely
          - binary: broker-agent
            cmd: ./cmd/broker-agent
            goos: linux
            goarch: amd64
            cgo: "0"
          - binary: broker-agent
            cmd: ./cmd/broker-agent
            goos: linux
            goarch: arm64
            cgo: "0"

          # broker-server: needs CGO for sqlite3, use zig for cross-compilation
          - binary: broker-server
            cmd: ./cmd/broker-server
            goos: linux
            goarch: amd64
            cgo: "1"
            cc: zig-cc
          - binary: broker-server
            cmd: ./cmd/broker-server
            goos: linux
            goarch: arm64
            cgo: "1"
            cc: zig-cc
            zig_target: aarch64-linux-musl

          # broker (CLI): needs CGO for sqlite3
          - binary: broker
            cmd: ./cmd/broker
            goos: linux
            goarch: amd64
            cgo: "1"
            cc: zig-cc
          - binary: broker
            cmd: ./cmd/broker
            goos: linux
            goarch: arm64
            cgo: "1"
            cc: zig-cc
            zig_target: aarch64-linux-musl
          - binary: broker
            cmd: ./cmd/broker
            goos: darwin
            goarch: amd64
            cgo: "1"
            cc: zig-cc
            zig_target: x86_64-macos
          - binary: broker
            cmd: ./cmd/broker
            goos: darwin
            goarch: arm64
            cgo: "1"
            cc: zig-cc
            zig_target: aarch64-macos

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: oven-sh/setup-bun@v2

      - uses: goto-bus-stop/setup-zig@v2
        if: matrix.cc == 'zig-cc'
        with:
          version: 0.13.0

      - name: extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: build dashboard
        run: |
          cd dashboard && bun install && bun run build
          rm -rf internal/dashboard/dist
          cp -r dashboard/dist internal/dashboard/dist

      - name: setup zig cc wrapper
        if: matrix.cc == 'zig-cc'
        run: |
          mkdir -p /tmp/zigcc
          ZIG_TARGET="${{ matrix.zig_target }}"
          if [ -z "$ZIG_TARGET" ]; then
            cat > /tmp/zigcc/zigcc <<'WRAPPER'
          #!/bin/sh
          exec zig cc "$@"
          WRAPPER
          else
            cat > /tmp/zigcc/zigcc <<WRAPPER
          #!/bin/sh
          exec zig cc -target ${ZIG_TARGET} "\$@"
          WRAPPER
          fi
          chmod +x /tmp/zigcc/zigcc

      - name: build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          CC: ${{ matrix.cc == 'zig-cc' && '/tmp/zigcc/zigcc' || '' }}
        run: |
          OUTPUT="${{ matrix.binary }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "bin/${OUTPUT}" \
            ${{ matrix.cmd }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/${{ matrix.binary }}-${{ matrix.goos }}-${{ matrix.goarch }}

  docker:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4

      - name: extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: VERSION=${{ env.VERSION }}
          tags: |
            ghcr.io/maxvandijck/broker:${{ env.VERSION }}
            ghcr.io/maxvandijck/broker:latest

  helm:
    runs-on: ubuntu-latest
    needs: build-binaries
    if: hashFiles('charts/broker/Chart.yaml') != ''
    steps:
      - uses: actions/checkout@v4

      - name: extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: install helm
        uses: azure/setup-helm@v4

      - name: login to ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: package chart
        run: |
          helm package charts/broker/ \
            --version "${VERSION}" \
            --app-version "${VERSION}"

      - name: push chart
        run: helm push broker-${VERSION}.tgz oci://ghcr.io/maxvandijck/charts

  release:
    runs-on: ubuntu-latest
    needs: [build-binaries, docker]
    steps:
      - uses: actions/checkout@v4

      - name: extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: make binaries executable
        run: chmod +x artifacts/*

      - name: create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "Broker ${GITHUB_REF_NAME}" \
            --generate-notes \
            artifacts/*
