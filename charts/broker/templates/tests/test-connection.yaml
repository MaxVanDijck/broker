apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "broker.fullname" . }}-test-connection"
  labels:
    {{- include "broker.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: curlimages/curl:8.12.1
      command: ['curl']
      args: ['-sf', '--max-time', '10', '--retry', '3', '--retry-delay', '5', 'http://{{ include "broker.fullname" . }}:{{ .Values.config.httpPort }}/healthz']
  restartPolicy: Never
