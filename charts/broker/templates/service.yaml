apiVersion: v1
kind: Service
metadata:
  name: {{ include "broker.fullname" . }}
  labels:
    {{- include "broker.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.config.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "broker.selectorLabels" . | nindent 4 }}
