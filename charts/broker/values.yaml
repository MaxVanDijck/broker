replicaCount: 1

image:
  repository: ghcr.io/maxvandijck/broker
  tag: ""  # defaults to chart appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

config:
  httpPort: 8080
  publicURL: ""  # e.g. wss://broker.example.com
  state:
    backend: sqlite
  analytics:
    backend: sqlite

# AWS credentials for cloud provisioning
aws:
  enabled: false
  accessKeyId: ""
  secretAccessKey: ""
  region: us-east-1

# Auth token for proxy-based auth
auth:
  token: ""

service:
  type: ClusterIP
  annotations: {}

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: broker.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi

serviceAccount:
  create: true
  name: ""
  annotations: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilization: 80

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
